<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PersonDetect</title>
    <link rel="stylesheet" href="/pkg/person-detect.css">
    <style>
        body { margin: 0; background: #0f172a; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid #334155; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loading-screen" id="loading">
        <div class="loading-spinner"></div>
        <span>Loading PersonDetect...</span>
    </div>
    <script type="module">
        import init, { hydrate } from '/pkg/person-detect.js';
        async function main() {
            try {
                await init({ module_or_path: '/pkg/person-detect.wasm' });
                hydrate();
            } catch (e) {
                console.error('WASM init/hydrate failed:', e);
                const loading = document.getElementById('loading');
                if (loading) {
                    loading.innerHTML = '<div style="color:#ef4444;max-width:80%;text-align:left;white-space:pre-wrap;"><strong>WASM init/hydrate failed</strong><br>' + (e && e.stack ? e.stack : String(e)) + '</div>';
                }
            }
        }
        main();
    </script>
</body>
</html>
